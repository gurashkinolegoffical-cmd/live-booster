name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk zip unzip wget

      - name: Install Android SDK command-line tools
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-6514223_latest.zip
          unzip -q commandlinetools-linux-6514223_latest.zip
          # После распаковки папка может называться cmdline-tools, перемещаем её в latest
          if [ -d "cmdline-tools" ]; then
            mv cmdline-tools latest
          else
            # Иногда архив распаковывается сразу в текущую папку без подпапки
            # Проверим, есть ли bin/sdkmanager
            if [ -f "bin/sdkmanager" ]; then
              mkdir -p latest
              mv * latest 2>/dev/null || true
              # Перемещаем обратно папку latest, чтобы не было конфликта
              cd ..
              mv latest/* cmdline-tools/latest/ 2>/dev/null || true
              rmdir latest
            fi
          fi
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Accept licenses and install build-tools
        run: |
          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT "build-tools;37.0.0" "platforms;android-33"

      - name: Install Buildozer
        run: pip install buildozer cython

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: livebooster-apk
          path: bin/*.apk
