name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk zip unzip wget

      - name: Setup Android SDK
        run: |
          SDK_DIR=$HOME/android-sdk
          mkdir -p $SDK_DIR/cmdline-tools
          cd $SDK_DIR/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest 2>/dev/null || true
          echo "ANDROID_SDK_ROOT=$SDK_DIR" >> $GITHUB_ENV
          echo "$SDK_DIR/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Accept licenses (manual)
        run: |
          mkdir -p $ANDROID_SDK_ROOT/licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6481e" > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license

      - name: Install build-tools and platform
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "build-tools;37.0.0" "platforms;android-33"

      - name: Install platform-tools manually
        run: |
          cd $ANDROID_SDK_ROOT
          wget -q https://dl.google.com/android/repository/platform-tools-latest-linux.zip
          unzip -q platform-tools-latest-linux.zip
          rm platform-tools-latest-linux.zip

      - name: Copy SDK to Buildozer expected location
        run: |
          mkdir -p $HOME/.buildozer/android/platform
          # Копируем весь SDK, включая build-tools, platform-tools, licenses
          cp -r $ANDROID_SDK_ROOT $HOME/.buildozer/android/platform/android-sdk
          # Buildozer ожидает sdkmanager в tools/bin, создадим и скопируем
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
          cp $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          # Не делаем заглушку! Настоящий sdkmanager останется.

      - name: Install Buildozer
        run: pip install buildozer cython

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: livebooster-apk
          path: bin/*.apk
